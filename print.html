<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impression</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    /* ── Reset propre ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* ── Couleurs par matière ─────────────────────────────────── */
    :root { --accent:#3B82F6; --accent-light:#EFF6FF; --accent-mid:#BFDBFE; --badge-text:#1E3A8A; }
    .subject-ee    { --accent:#16A34A; --accent-light:#F0FDF4; --accent-mid:#BBF7D0; --badge-text:#14532D; }
    .subject-pc    { --accent:#9333EA; --accent-light:#FAF5FF; --accent-mid:#E9D5FF; --badge-text:#581C87; }
    .subject-maths { --accent:#EA580C; --accent-light:#FFF7ED; --accent-mid:#FED7AA; --badge-text:#7C2D12; }

    /* ── Base ─────────────────────────────────────────────────── */
    html {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 7.5pt;
      line-height: 1.35;
      color: #111827;
      background: #E8EAF0;
    }

    /* ── Barre d'outils ───────────────────────────────────────── */
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #fff;
      border-bottom: 1px solid #E2E8F0;
      padding: 0.45rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      z-index: 1000;
    }
    .toolbar button {
      padding: 0.28rem 0.75rem;
      border: 1.5px solid #CBD5E1;
      border-radius: 99px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
    }
    .toolbar .btn-primary { background:#3B82F6; color:#fff; border-color:#3B82F6; }
    .toolbar .hint { font-size: 10px; color:#64748B; flex:1; min-width:180px; line-height:1.3; }
    .toolbar .hint strong { color:#334155; }

    /* ── Feuille centrée (aperçu écran) ───────────────────────── */
    .page {
      max-width: 14.8cm;
      margin: 3.2rem auto 2rem;
      background: white;
      padding: 1.2cm;
      box-shadow: 0 4px 24px rgba(0,0,0,0.13);
      min-height: 18.6cm;
    }

    /* ── En-tête du chapitre ──────────────────────────────────── */
    .chapter-header {
      background: var(--accent-light);
      border-left: 4pt solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 0.38rem 0.7rem;
      margin-bottom: 0.55rem;
    }
    .chapter-meta {
      display: inline-block;
      font-size: 5.5pt;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--badge-text);
      background: var(--accent-mid);
      border-radius: 99px;
      padding: 0.5pt 5pt;
      margin-bottom: 0.1rem;
    }
    .chapter-title {
      font-size: 13pt;
      font-weight: 800;
      line-height: 1.15;
      color: #111827;
      margin: 0;
    }

    /* ── Sections ─────────────────────────────────────────────── */
    .fiche-section { margin-bottom: 0.42rem; }
    .fiche-section > h2 {
      font-size: 6.5pt;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--badge-text);
      background: var(--accent-light);
      border-left: 2.5pt solid var(--accent);
      padding: 2pt 5pt;
      margin: 0 0 0.18rem;
      border-radius: 0 3px 3px 0;
      break-after: avoid;
    }

    /* ── Contenu ──────────────────────────────────────────────── */
    .fiche-section-content { font-size: 7.5pt; line-height: 1.35; }
    .fiche-section-content h3 {
      font-size: 7.5pt; font-weight: 700; color: var(--accent);
      margin: 0.2rem 0 0.07rem; break-after: avoid;
    }
    .fiche-section-content h4 {
      font-size: 7pt; font-weight: 600; color: #555;
      margin: 0.1rem 0 0.04rem;
    }
    .fiche-section-content p { margin: 0 0 0.09rem; }
    .fiche-section-content ul,
    .fiche-section-content ol { padding-left: 0.95rem; margin: 0.04rem 0 0.08rem; }
    .fiche-section-content li { margin-bottom: 0.03rem; }
    .fiche-section-content strong { font-weight: 700; }
    .fiche-section-content em { font-style: italic; }

    /* ── Blocs formule ────────────────────────────────────────── */
    .formula-block {
      background: var(--accent-light);
      border-left: 2.5pt solid var(--accent);
      border-radius: 0 4px 4px 0;
      padding: 0.16rem 0.5rem;
      margin: 0.1rem 0;
      break-inside: avoid;
    }

    /* ── Boîtes ───────────────────────────────────────────────── */
    .definition-box {
      background: #EFF6FF; border-left: 2.5pt solid #3B82F6;
      border-radius: 0 4px 4px 0; padding: 0.12rem 0.4rem; margin: 0.08rem 0; break-inside: avoid;
    }
    .warning-box, .alert-info {
      background: #FFFBEB; border-left: 2.5pt solid #F59E0B;
      border-radius: 0 4px 4px 0; padding: 0.12rem 0.4rem; margin: 0.08rem 0; break-inside: avoid;
    }
    .tip-box {
      background: #F0FDF4; border-left: 2.5pt solid #22C55E;
      border-radius: 0 4px 4px 0; padding: 0.12rem 0.4rem; margin: 0.08rem 0; break-inside: avoid;
    }

    /* ── Tableaux ─────────────────────────────────────────────── */
    .fiche-section-content table {
      width: 100%; border-collapse: collapse;
      font-size: 7pt; margin: 0.1rem 0; break-inside: avoid;
    }
    .fiche-section-content th {
      background: var(--accent-mid); color: var(--badge-text);
      font-weight: 700; padding: 0.1rem 0.28rem; text-align: left;
    }
    .fiche-section-content td {
      border: 0.5pt solid #E2E8F0; padding: 0.07rem 0.28rem; vertical-align: top;
    }
    .fiche-section-content tr:nth-child(even) td { background: var(--accent-light); }

    /* ── KaTeX ────────────────────────────────────────────────── */
    .katex { font-size: 0.95em; }
    .katex-display { margin: 0.15rem 0 !important; overflow: visible; }

    /* ── Saut de page (batch) ─────────────────────────────────── */
    .page-break { break-before: page; }

    /* ── Impression ───────────────────────────────────────────── */
    @media print {
      @page { margin: 1.2cm; }
      html { background: white; }
      .toolbar { display: none !important; }
      .page {
        max-width: none;
        margin: 0;
        padding: 0;
        box-shadow: none;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn-primary" onclick="window.print()">⎙ Imprimer / PDF</button>
    <button onclick="window.close()">✕ Fermer</button>
    <span class="hint" id="hint"></span>
  </div>

  <div class="page">
    <div id="content" style="color:#94a3b8;font-size:11px">Chargement…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
    (function () {
      var ua = navigator.userAgent;
      var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
      var isSafari = !isMobile && /^((?!chrome|android).)*safari/i.test(ua);
      var hint = document.getElementById('hint');
      if (isMobile) {
        hint.textContent = 'iPhone : Imprimer → maintenir l’aperçu → Partager → « Enregistrer dans Fichiers »';
      } else if (isSafari) {
        hint.innerHTML = 'Safari : <strong>cocher « Imprimer les fonds »</strong>, <strong>décocher « En-têtes et pieds »</strong>, choisir <strong>A5</strong>.';
      } else {
        hint.innerHTML = 'Choisir « Enregistrer en PDF » et format <strong>A5</strong>.';
      }

      var key = location.hash.slice(1);
      if (!key) return;

      var raw = localStorage.getItem(key);
      if (!raw) { document.getElementById('content').textContent = 'Données introuvables.'; return; }
      localStorage.removeItem(key);

      var data = JSON.parse(raw);
      document.title = data.title || 'Fiche';

      var el = document.getElementById('content');
      el.innerHTML = data.html;

      try {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$',   right: '$$',   display: true  },
            { left: '\\[',  right: '\\]',  display: true  },
            { left: '$',    right: '$',    display: false },
            { left: '\\(',  right: '\\)',  display: false }
          ],
          throwOnError: false
        });
      } catch (e) { console.warn('KaTeX:', e); }
    })();
  </script>
</body>
</html>
